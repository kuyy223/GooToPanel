<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GooToPanel</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="auth-page">

  <!-- Navbar -->
  <header class="auth-navbar">
    <a href="index.html" class="auth-logo">
      GooToPanel
    </a>

    <a href="register.html" class="auth-nav-btn">
      Register
    </a>
  </header>

  <!-- Login Section -->
  <section class="auth-section">

    <div class="auth-card">

      <div class="auth-header">
        <h1>Selamat Datang 👋</h1>

        <p>
          Masuk ke akun GooToPanel Anda untuk
          mulai membuat pesanan.
        </p>
      </div>

      <form id="loginForm">

        <div class="input-group">
          <label for="email">Email</label>

          <input
            type="email"
            id="email"
            placeholder="Masukkan email"
            required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>

          <div class="password-box">
            <input
              type="password"
              id="password"
              placeholder="Masukkan password"
              required>

            <i
              class="fa-solid fa-eye password-toggle"
              id="togglePassword">
            </i>
          </div>
        </div>

        <div class="remember-box">

          <label class="checkbox">
            <input type="checkbox" id="remember">
            Ingat Saya
          </label>

          <a href="#" class="forgot">
            Lupa Password?
          </a>

        </div>

        <button
          type="submit"
          class="btn-primary auth-btn">
          Login
        </button>

      </form>

      <div class="divider">
        <span>ATAU</span>
      </div>

      <button
        type="button"
        class="google-btn"
        id="googleLogin">
        Login dengan Google
      </button>

      <div class="auth-footer">
        <p>
          Belum memiliki akun?
          <a href="register.html">
            Daftar Sekarang
          </a>
        </p>
      </div>

    </div>

  </section>

  <!-- Loading -->
  <div id="loading" class="loading-overlay" style="display:none;">
    <div class="loader"></div>
    <p>Sedang masuk...</p>
  </div>

  <script>
alert("Javascript biasa berjalan");
  </script>
  <script>
window.onerror = function(msg){
  alert(msg);
};
</script>
  <!-- Firebase -->
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/auth.js"></script>

</body>
</html>
