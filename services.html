<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Layanan - GooToPanel</title>

  <link rel="stylesheet" href="css/admin.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="main">

  <!-- Header -->
  <div class="topbar">

    <h2>Kelola Layanan</h2>

    <button
      id="addServiceBtn"
      class="add-btn">
      <i class="fa-solid fa-plus"></i>
      Tambah Layanan
    </button>

  </div>

  <!-- Tabel -->
  <div class="table-container">

    <table class="service-table">

      <thead>
        <tr>
          <th>Nama Layanan</th>
          <th>Kategori</th>
          <th>Harga</th>
          <th>Min</th>
          <th>Max</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>

      <tbody id="serviceList">

        <!-- Data dari Firebase -->

      </tbody>

    </table>

  </div>

</div>

<!-- Modal Tambah Layanan -->
<div
  id="serviceModal"
  class="modal">

  <div class="modal-content">

    <div class="modal-header">
      <h3>Tambah Layanan</h3>

      <button
        id="closeModal"
        class="close-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="input-group">
      <label>Nama Layanan</label>

      <input
        type="text"
        id="serviceName"
        placeholder="Instagram Followers">
    </div>

    <div class="input-group">
      <label>Kategori</label>

      <input
        type="text"
        id="serviceCategory"
        placeholder="Instagram">
    </div>

    <div class="input-group">
      <label>Harga</label>

      <input
        type="number"
        id="servicePrice"
        placeholder="10000">
    </div>

    <div class="input-group">
      <label>Minimal Order</label>

      <input
        type="number"
        id="serviceMin"
        placeholder="100">
    </div>

    <div class="input-group">
      <label>Maksimal Order</label>

      <input
        type="number"
        id="serviceMax"
        placeholder="10000">
    </div>

    <button
      id="saveService"
      class="save-btn">
      Simpan Layanan
    </button>

  </div>

</div>

<script type="module" src="js/services.js"></script>

</body>
</html>
