<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,initial-scale=1.0">

  <title>Admin Dashboard</title>

  <link rel="stylesheet"
        href="css/admin.css">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div id="overlay" class="overlay"></div>
  
<div class="sidebar">

  <div class="logo">
    GooToPanel
  </div>

  <ul>

    <li class="active">
      <a href="admin.html">
        <i class="fa-solid fa-house"></i>
        Dashboard
      </a>
    </li>

    <li>
      <a href="services.html">
        <i class="fa-solid fa-box"></i>
        Layanan
      </a>
    </li>

    <li>
      <a href="orders.html">
        <i class="fa-solid fa-cart-shopping"></i>
        Pesanan
      </a>
    </li>

    <li>
      <a href="users.html">
        <i class="fa-solid fa-users"></i>
        Pengguna
      </a>
    </li>

    <li>
      <a href="balance.html">
        <i class="fa-solid fa-wallet"></i>
        Saldo
      </a>
    </li>

    <li id="logoutBtn">
      <i class="fa-solid fa-right-from-bracket"></i>
      Logout
    </li>

  </ul>

</div>

<div class="main">

  <div class="topbar">

  <button id="menuBtn" class="menu-btn">
    <i class="fa-solid fa-bars"></i>
  </button>

  <h2>Dashboard Admin</h2>

  <div class="profile">
    <img id="adminPhoto"
         src="https://ui-avatars.com/api/?name=Admin">

    <span id="adminName">
      Administrator
    </span>
  </div>

  </div>

  <div class="cards">

    <div class="card">
      <h3>Total User</h3>
      <p id="totalUsers">0</p>
    </div>

    <div class="card">
      <h3>Total Order</h3>
      <p id="totalOrders">0</p>
    </div>

    <div class="card">
      <h3>Total Pendapatan</h3>
      <p id="totalIncome">
        Rp0
      </p>
    </div>

    <div class="card">
      <h3>Total Saldo</h3>
      <p id="totalBalance">
        Rp0
      </p>
    </div>

  </div>

  <div class="recent">

  <h3>Aktivitas Terbaru</h3>

  <div
    id="activityList"
    class="activity-list">

    <div class="empty">
      Belum ada aktivitas.
    </div>

  </div>

  </div>

</div>

<script type="module"
        src="js/admin.js">
</script>

</body>
</html>
